name: Sonar Discovery

on:
  workflow_run:
    workflows: ["Build Discovery"]
    types: [completed]
  workflow_dispatch:

jobs:
  sonar:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    uses: hendafarhani/microGo/.github/workflows/sonar.yml@main
    with:
      java_version: "21"
      sonar_project_key: "hendafarhani_discovery"
      sonar_organization: "hendafarhani"
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
